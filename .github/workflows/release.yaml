name: "build"

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.2.2)'
        required: true
        default: '2.2.2'

env:
  DANDANAPI_APPID: ${{ secrets.DANDANAPI_APPID }}
  DANDANAPI_KEY: ${{ secrets.DANDANAPI_KEY }}
  KAZUMI_APPID: ${{ secrets.KAZUMI_APPID }}
  KAZUMI_KEY: ${{ secrets.KAZUMI_KEY }}

jobs:
  build-and-sign:
    name: "构建并签名"
    runs-on: "ubuntu-latest" 
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set version
        run: echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'          

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash

      - name: Remove build id
        run: sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt

      - name: Build Flutter for Android
        run: >
          flutter build apk --split-per-abi
          --dart-define=DANDANAPI_APPID=$DANDANAPI_APPID
          --dart-define=DANDANAPI_KEY=$DANDANAPI_KEY
          --dart-define=KAZUMI_APPID=$KAZUMI_APPID
          --dart-define=KAZUMI_KEY=$KAZUMI_KEY
        shell: bash

      # 签名
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > yhdm.jks
        shell: bash

      - name: Sign APK
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner"
          $APKSIGNER sign \
            --ks yhdm.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out YHDM_android_${{ env.tag }}.apk \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        shell: bash

      - name: Verify signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner"
          $APKSIGNER verify YHDM_android_${{ env.tag }}.apk
        shell: bash

      # 发布到当前仓库的 Release
      - name: Create Release in current repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.tag }}"
          
          # 如果 tag 已存在则删除重建
          if gh release view $TAG &>/dev/null; then
            gh release delete $TAG -y
            git push --delete origin $TAG 2>/dev/null || true
            sleep 2
          fi
          
          gh release create $TAG \
            --title "v$TAG" \
            --notes "樱花动漫 v$TAG（已签名，可下载修改后发布）" \
            YHDM_android_$TAG.apk
        shell: bash