name: "release"

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.2.2)'
        required: true
        default: '2.2.2'
      logLevel:
        description: 'Log level'     
        required: true
        default: 'warning'

env:
  DANDANAPI_APPID: ${{ secrets.DANDANAPI_APPID }}
  DANDANAPI_KEY: ${{ secrets.DANDANAPI_KEY }}
  KAZUMI_APPID: ${{ secrets.KAZUMI_APPID }}
  KAZUMI_KEY: ${{ secrets.KAZUMI_KEY }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

jobs:
  flutter-build-android:
    name: "Release for android"
    runs-on: "ubuntu-latest" 
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      # 获取版本号
      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Echo build progress
        run: echo "Building YHDM_android_${{ env.tag }}.apk"
        shell: bash

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'          

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash

      - name: Remove build id
        run: sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt

      - name: Build Flutter for Android
        run: >
          flutter build apk --split-per-abi
          --dart-define=DANDANAPI_APPID=$DANDANAPI_APPID
          --dart-define=DANDANAPI_KEY=$DANDANAPI_KEY
          --dart-define=KAZUMI_APPID=$KAZUMI_APPID
          --dart-define=KAZUMI_KEY=$KAZUMI_KEY
        shell: bash

      # ========== 签名步骤 ==========
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > yhdm.jks
        shell: bash

      - name: Sign APK
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner"
          $APKSIGNER sign \
            --ks yhdm.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out YHDM_android_${{ env.tag }}_signed.apk \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        shell: bash

      - name: Verify signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner"
          $APKSIGNER verify YHDM_android_${{ env.tag }}_signed.apk
        shell: bash
      # =============================

      # 上传 APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YHDM_android_${{ env.tag }}
          path: YHDM_android_*_signed.apk

      # 创建 Release
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag }}
          name: v${{ env.tag }}
          body: |
            ## 🎉 樱花动漫 v${{ env.tag }}
            
            ### 更新内容
            - 请在此填写更新日志...
            
            ### 下载
            - [YHDM_android_${{ env.tag }}_signed.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.tag }}/YHDM_android_${{ env.tag }}_signed.apk)
          files: YHDM_android_*_signed.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TG 通知
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            🎉 *樱花动漫 v${{ env.tag }} 发布成功！*
            
            📦 文件名：YHDM_android_${{ env.tag }}_signed.apk
            📥 下载：https://github.com/${{ github.repository }}/releases/download/${{ env.tag }}/YHDM_android_${{ env.tag }}_signed.apk
            🔗 发布页：https://github.com/${{ github.repository }}/releases/tag/${{ env.tag }}
          format: markdown